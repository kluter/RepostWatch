name: poll

on:
  schedule:
    - cron: "30 16 * * *"  # 18:30 CEST (GitHub cron is UTC, so 17:30 local in winter/CET)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0        # full history so the rebase-before-push below works

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll feeds
        run: python poll.py

      - name: Commit updated data
        run: |
          git config user.name "repostwatch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: poll $(date -u +%Y-%m-%d)"
            # rebase onto anything pushed since checkout so the push never rejects;
            # events.jsonl union-merges via .gitattributes, so this stays clean
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
