name: poll

on:
  schedule:
    # odd, off-peak minutes on purpose: GitHub delays scheduled runs most at :00/:30,
    # so we avoid those popular boundaries to get picked up sooner.
    - cron: "37 10 * * *"  # ~12:37 CEST (11:37 CET in winter) — midday, catches same-day churn
    - cron: "43 16 * * *"  # ~18:43 CEST (17:43 CET in winter) — after HR wraps up
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - companies.yaml       # editing the company list rebuilds data/index.json right away

permissions:
  contents: write

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0        # full history so the rebase-before-push below works

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll feeds
        run: python poll.py

      - name: Commit updated data
        run: |
          git config user.name "repostwatch-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: poll $(date -u +%Y-%m-%d)"
            # rebase onto anything pushed since checkout so the push never rejects;
            # events.jsonl union-merges via .gitattributes, so this stays clean
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
